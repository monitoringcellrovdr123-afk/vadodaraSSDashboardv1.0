<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vadodara Region Samruddh Sahastraveer Campaign Dashboard</title>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .glass-panel { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[#0a0a0c]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1lSMyOt8LJaUmBZPdlVWvcy9Gci8UHrDH3pXQEfsvsC4/gviz/tq?tqx=out:csv&sheet=SSGD";
        const REFRESH_INTERVAL = 60;

        const KPI_CONFIG = {
            done: [
                { key: 'POSB_NetAddition', label: 'POSB Net Add' },
                { key: 'TD_NetAddition', label: 'TD Net Add' },
                { key: 'SBPRM', label: 'SBPRM' },
                { key: 'POSA_Linkage', label: 'POSA Linkage' },
                { key: 'Aadhaar_Seeding', label: 'Aadhaar Seeding' },
                { key: 'CELC', label: 'CELC' },
                { key: 'GI_Premium', label: 'GI Premium' },
                { key: 'Mails_booking', label: 'Mails Booking' },
                { key: 'PLI', label: 'PLI' },
                { key: 'RPLI', label: 'RPLI' },
                { key: 'Connections', label: 'Connections' }
            ],
            pending: [
                { key: 'Pending_POSB_NetAddition', label: 'Pend. POSB' },
                { key: 'Pending_TD_NetAddition', label: 'Pend. TD' },
                { key: 'Pending_SBPRM', label: 'Pend. SBPRM' },
                { key: 'Pending_Seeding_Linkage_CELC', label: 'Seed/Link/CELC' },
                { key: 'Pending_GI_Premium', label: 'Pend. GI' },
                { key: 'Pending_Mails_booking', label: 'Pend. Mails' },
                { key: 'Pending_PLI', label: 'Pend. PLI' },
                { key: 'Pending_RPLI', label: 'Pend. RPLI' }
            ]
        };

        const MILESTONE_COLUMNS = [
            "Beginner BO Below 100", "Beginner BO 100+", "Beginner BO 200+", "Beginner BO 300+",
            "Improving BO", "Potential BO", "Samruddh BO", "Samruddh Sahastraveer BO"
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                award: <path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526" />,
                sun: <React.Fragment><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></React.Fragment>,
                moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />,
                clock: <React.Fragment><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></React.Fragment>,
                monitor: <React.Fragment><rect width="20" height="14" x="2" y="3" rx="2" /><line x1="8" x2="16" y1="21" y2="21" /><line x1="12" x2="12" y1="17" y2="21" /></React.Fragment>,
                smartphone: <React.Fragment><rect width="14" height="20" x="5" y="2" rx="2" /><path d="M12 18h.01" /></React.Fragment>,
                refresh: <React.Fragment><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" /><path d="M16 16h5v5" /></React.Fragment>,
                filter: <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />,
                download: <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" /></React.Fragment>,
                chevronRight: <path d="m9 18 6-6-6-6" />,
                chevronDown: <path d="m6 9 6 6 6-6" />,
                database: <React.Fragment><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" /><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3" /></React.Fragment>,
                chart: <React.Fragment><path d="M3 3v18h18" /><path d="M18 9l-5 5-2-2-4 4" /></React.Fragment>,
                star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const parseCSV = (csvText) => {
            const lines = csvText.split(/\r?\n/);
            const result = [];
            if (!lines[0]) return [];
            const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const obj = {};
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                headers.forEach((header, index) => {
                    let val = currentline[index] ? currentline[index].replace(/^"|"$/g, '').trim() : "";
                    let cleanHeader = (header === 'Sub_Divisions' || header === 'Subdivision' || header === 'Sub_divisions') ? 'Sub_Division' : header;
                    if (!isNaN(val) && val !== "" && typeof val === 'string') val = parseFloat(val);
                    if (typeof val === 'string') val = val.trim();
                    obj[cleanHeader] = val;
                });
                result.push(obj);
            }
            return result;
        };

        const KPICard = ({ label, value, type, isDark }) => (
            <div className={`relative p-4 rounded-xl border transition-all ${isDark ? (type === 'done' ? 'bg-amber-900/10 border-amber-500/30 shadow-lg shadow-amber-900/10' : 'bg-slate-800/10 border-white/5') : 'bg-white border-slate-200 shadow-sm'}`}>
                <p className={`text-[10px] font-bold uppercase tracking-wider mb-1 opacity-60`}>{label}</p>
                <h3 className={`text-xl font-black ${isDark ? 'text-white' : 'text-slate-800'}`}>
                    {typeof value === 'number' ? value.toLocaleString('en-IN') : value}
                </h3>
                {type === 'done' && <div className="absolute top-2 right-2 opacity-10"><Icon name="chart" size={16} /></div>}
            </div>
        );

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [timer, setTimer] = useState(REFRESH_INTERVAL);
            const [isDark, setIsDark] = useState(true);
            const [isMobileView, setIsMobileView] = useState(false);
            const [atAGlanceView, setAtAGlanceView] = useState('divisions');
            const [expandedRows, setExpandedRows] = useState(new Set());
            const [filters, setFilters] = useState({ division: '', subDivision: '', so: '', bo: '' });

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js";
                script.async = true;
                document.body.appendChild(script);
            }, []);

            const fetchData = useCallback(async () => {
                try {
                    const response = await fetch(GOOGLE_SHEET_URL);
                    const parsed = parseCSV(await response.text());
                    setData(parsed);
                    setTimer(REFRESH_INTERVAL);
                    setLoading(false);
                } catch (e) { console.error(e); setLoading(false); }
            }, []);

            useEffect(() => {
                fetchData();
                const intv = setInterval(() => setTimer(t => (t <= 1 ? (fetchData(), REFRESH_INTERVAL) : t - 1)), 1000);
                return () => clearInterval(intv);
            }, [fetchData]);

            const filterOptions = useMemo(() => ({
                divisions: [...new Set(data.map(i => i.Name_of_Division))].filter(Boolean).sort(),
                subDivisions: [...new Set(data.filter(i => !filters.division || i.Name_of_Division === filters.division).map(i => i.Sub_Division))].filter(Boolean).sort(),
                sos: [...new Set(data.filter(i => (!filters.division || i.Name_of_Division === filters.division) && (!filters.subDivision || i.Sub_Division === filters.subDivision)).map(i => i.SO_Name))].filter(Boolean).sort(),
                bos: [...new Set(data.filter(i => (!filters.division || i.Name_of_Division === filters.division) && (!filters.subDivision || i.Sub_Division === filters.subDivision) && (!filters.so || i.SO_Name === filters.so)).map(i => i.BO_Name))].filter(Boolean).sort()
            }), [data, filters]);

            const kpiValues = useMemo(() => {
                const filtered = data.filter(i => (!filters.division || i.Name_of_Division === filters.division) && (!filters.subDivision || i.Sub_Division === filters.subDivision) && (!filters.so || i.SO_Name === filters.so) && (!filters.bo || i.BO_Name === filters.bo));
                const res = { done: {}, pending: {}, milestone: filters.bo ? (filtered[0]?.Milestone || "N/A") : "Aggregate" };
                KPI_CONFIG.done.forEach(k => res.done[k.key] = filters.bo ? (filtered[0]?.[k.key] || 0) : filtered.reduce((a, c) => a + (Number(c[k.key]) || 0), 0));
                KPI_CONFIG.pending.forEach(k => res.pending[k.key] = filters.bo ? (filtered[0]?.[k.key] || 0) : filtered.reduce((a, c) => a + (Number(c[k.key]) || 0), 0));
                return res;
            }, [data, filters]);

            const matrixData = useMemo(() => {
                const groupKey = atAGlanceView === 'divisions' ? 'Name_of_Division' : 'Sub_Division';
                const subKey = atAGlanceView === 'divisions' ? 'Sub_Division' : 'SO_Name';
                const groups = {};
                data.forEach(item => {
                    const gName = item[groupKey] || "Unspecified";
                    if (!groups[gName]) { groups[gName] = { name: gName, total: 0, milestones: {}, subs: {} }; MILESTONE_COLUMNS.forEach(m => groups[gName].milestones[m] = 0); }
                    groups[gName].total++;
                    if (MILESTONE_COLUMNS.includes(item.Milestone)) groups[gName].milestones[item.Milestone]++;
                    const sName = item[subKey] || "Unspecified";
                    if (!groups[gName].subs[sName]) { groups[gName].subs[sName] = { name: sName, total: 0, milestones: {} }; MILESTONE_COLUMNS.forEach(m => groups[gName].subs[sName].milestones[m] = 0); }
                    groups[gName].subs[sName].total++;
                    if (MILESTONE_COLUMNS.includes(item.Milestone)) groups[gName].subs[sName].milestones[item.Milestone]++;
                });
                return Object.values(groups).sort((a, b) => a.name.localeCompare(b.name));
            }, [data, atAGlanceView]);

            const globalTotals = useMemo(() => {
                const t = { total: 0, milestones: {} };
                MILESTONE_COLUMNS.forEach(m => t.milestones[m] = matrixData.reduce((a, c) => a + c.milestones[m], 0));
                t.total = matrixData.reduce((a, c) => a + c.total, 0);
                return t;
            }, [matrixData]);

            const handleTableClick = (rowType, rowValue, columnType) => {
                let f = [...data];
                if (filters.division) f = f.filter(i => i.Name_of_Division === filters.division);
                if (filters.subDivision) f = f.filter(i => i.Sub_Division === filters.subDivision);
                if (rowType !== 'total') {
                    const keyMap = { 'division': 'Name_of_Division', 'subdivision': 'Sub_Division', 'so': 'SO_Name' };
                    f = f.filter(i => (i[keyMap[rowType]] || "Unspecified") === rowValue);
                }
                if (columnType !== 'total_bos') f = f.filter(i => i.Milestone === columnType);
                if (window.XLSX) {
                    const ws = window.XLSX.utils.json_to_sheet(f);
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, ws, "Data");
                    window.XLSX.writeFile(wb, `Export_${rowValue}_${columnType}.xlsx`);
                }
            };

            const downloadMatrix = () => {
                const flattened = [];
                matrixData.forEach(row => {
                    flattened.push({
                        Level: atAGlanceView === 'divisions' ? 'Division' : 'Sub_Division',
                        Name: row.name,
                        ...row.milestones,
                        Total_BOs: row.total
                    });
                });
                flattened.push({
                    Level: 'TOTAL',
                    Name: 'ALL REGION',
                    ...globalTotals.milestones,
                    Total_BOs: globalTotals.total
                });
                if (window.XLSX) {
                    const ws = window.XLSX.utils.json_to_sheet(flattened);
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, ws, "Data");
                    window.XLSX.writeFile(wb, `Matrix_${atAGlanceView}_${new Date().toISOString().split('T')[0]}.xlsx`);
                }
            };

            const downloadRaw = () => {
                const filtered = data.filter(i => (!filters.division || i.Name_of_Division === filters.division) && (!filters.subDivision || i.Sub_Division === filters.subDivision) && (!filters.so || i.SO_Name === filters.so) && (!filters.bo || i.BO_Name === filters.bo));
                if (window.XLSX) {
                    const ws = window.XLSX.utils.json_to_sheet(filtered);
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, ws, "Data");
                    window.XLSX.writeFile(wb, `Raw_Data_${new Date().toISOString().split('T')[0]}.xlsx`);
                }
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center text-white gap-4"><div className="animate-spin text-amber-500"><Icon name="refresh" size={40} /></div><p className="animate-pulse">Loading Campaign Data...</p></div>;

            return (
                <div className={`${isDark ? 'bg-[#0a0a0c] text-white' : 'bg-orange-50 text-slate-900'} min-h-screen transition-all ${isMobileView ? 'max-w-md mx-auto shadow-2xl border-x border-white/5' : ''}`}>
                    <header className={`sticky top-0 z-50 p-4 border-b glass-panel flex justify-between items-center ${isDark ? 'bg-black/60 border-white/10' : 'bg-white/80 border-orange-200'}`}>
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-amber-500 rounded-lg text-white shadow-lg shadow-amber-500/20"><Icon name="award" /></div>
                            <div>
                                <h1 className="font-black text-sm uppercase leading-none">Vadodara Region</h1>
                                <p className="text-[9px] opacity-50 uppercase tracking-widest mt-1">Samruddh Sahastraveer Dashboard</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="hidden md:flex items-center gap-2 px-3 py-1 bg-black/20 rounded-full border border-white/10 text-[10px] font-mono">
                                <Icon name="clock" size={12} className="text-amber-500" /> <span>{timer}s</span>
                            </div>
                            <div className="flex p-1 bg-black/10 rounded-full border border-white/5">
                                <button onClick={() => setIsMobileView(false)} className={`p-1.5 rounded-full transition-all ${!isMobileView ? 'bg-amber-500 text-white shadow-lg' : 'opacity-40'}`}><Icon name="monitor" size={14} /></button>
                                <button onClick={() => setIsMobileView(true)} className={`p-1.5 rounded-full transition-all ${isMobileView ? 'bg-amber-500 text-white shadow-lg' : 'opacity-40'}`}><Icon name="smartphone" size={14} /></button>
                            </div>
                            <button onClick={() => setIsDark(!isDark)} className={`p-2 rounded-full transition-all ${isDark ? 'bg-white/5 text-amber-500' : 'bg-orange-500 text-white shadow-lg'}`}>
                                <Icon name={isDark ? 'sun' : 'moon'} />
                            </button>
                        </div>
                    </header>

                    <main className="p-4 space-y-8 max-w-7xl mx-auto">
                        {/* FILTERS */}
                        <section className={`p-6 rounded-2xl border glass-panel transition-all ${isDark ? 'bg-white/5 border-white/10' : 'bg-white border-orange-200'} grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4`}>
                            {['division', 'subDivision', 'so', 'bo'].map(f => {
                                return (
                                    <div key={f} className="space-y-1">
                                        <label className="text-[10px] font-bold uppercase opacity-50 ml-1">{f.replace(/([A-Z])/g, ' $1')}</label>
                                        <select 
                                            value={filters[f]} 
                                            onChange={e => setFilters({...filters, [f]: e.target.value, ...(f==='division'?{subDivision:'',so:'',bo:''}:f==='subDivision'?{so:'',bo:''}:f==='so'?{bo:''}:{})})}
                                            className={`w-full bg-transparent border rounded-xl p-2.5 text-sm outline-none transition-all ${isDark ? 'border-white/10 hover:border-amber-500/50' : 'border-orange-200 bg-white'}`}
                                        >
                                            <option value="" className="bg-slate-900 text-white">All {f.replace(/([A-Z])/g, ' $1')}</option>
                                            {filterOptions[f + 's']?.map(o => <option key={o} value={o} className="bg-slate-900 text-white">{o}</option>)}
                                        </select>
                                    </div>
                                );
                            })}
                        </section>

                        {/* MILESTONE CARD */}
                        <div className="flex items-center justify-between gap-4 flex-wrap">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-amber-500/10 rounded-lg text-amber-500"><Icon name="chart" /></div>
                                <h2 className="text-xl font-black uppercase tracking-tight">Performance metrics</h2>
                            </div>
                            <div className={`flex items-center gap-3 px-4 py-2 rounded-2xl border-2 ${isDark ? 'bg-amber-500/10 border-amber-500/30 text-amber-500' : 'bg-white border-amber-500 text-amber-600 shadow-lg shadow-amber-500/10'}`}>
                                <Icon name="star" size={16} fill="currentColor" />
                                <span className="text-[10px] font-bold uppercase tracking-widest opacity-70">Milestone:</span>
                                <span className="text-sm font-black">{kpiValues.milestone}</span>
                            </div>
                        </div>

                        {/* WORK DONE SECTION */}
                        <div className="space-y-4">
                            <h3 className="text-xs font-bold uppercase tracking-[0.2em] opacity-40 flex items-center gap-2">
                                <div className="w-10 h-[1px] bg-amber-500"></div> Work Done
                            </h3>
                            <section className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3">
                                {KPI_CONFIG.done.map(k => <KPICard key={k.key} label={k.label} value={kpiValues.done[k.key]} type="done" isDark={isDark} />)}
                            </section>
                        </div>

                        {/* WORK PENDING SECTION */}
                        <div className="space-y-4">
                            <h3 className="text-xs font-bold uppercase tracking-[0.2em] opacity-40 flex items-center gap-2">
                                <div className="w-10 h-[1px] bg-slate-500"></div> Work Pending
                            </h3>
                            <section className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
                                {KPI_CONFIG.pending.map(k => <KPICard key={k.key} label={k.label} value={kpiValues.pending[k.key]} type="pending" isDark={isDark} />)}
                            </section>
                        </div>

                        {/* TABLE SECTION */}
                        <section className="pt-8 space-y-4">
                            <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-indigo-500/10 rounded-lg text-indigo-500"><Icon name="database" /></div>
                                    <h2 className="text-xl font-black uppercase tracking-tight">Divisions at a glance</h2>
                                </div>
                                <div className="flex flex-wrap items-center gap-3">
                                    <div className="flex p-1 bg-black/5 rounded-xl border border-white/5 backdrop-blur-sm">
                                        {['divisions', 'subdivisions'].map(v => (
                                            <button key={v} onClick={() => setAtAGlanceView(v)} className={`px-5 py-2 text-[10px] font-black rounded-lg uppercase transition-all ${atAGlanceView === v ? 'bg-indigo-500 text-white shadow-lg' : 'opacity-40 hover:opacity-70'}`}>{v}</button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={downloadMatrix} className={`flex items-center gap-2 px-3 py-2 rounded-xl text-[10px] font-bold border transition-all ${isDark ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-500 hover:bg-emerald-500/20' : 'bg-emerald-50 text-emerald-600 border-emerald-200 hover:bg-emerald-100'}`}>
                                            <Icon name="download" size={14} /> Matrix
                                        </button>
                                        <button onClick={downloadRaw} className={`flex items-center gap-2 px-3 py-2 rounded-xl text-[10px] font-bold border transition-all ${isDark ? 'bg-blue-500/10 border-blue-500/30 text-blue-500 hover:bg-blue-500/20' : 'bg-blue-50 text-blue-600 border-blue-200 hover:bg-blue-100'}`}>
                                            <Icon name="download" size={14} /> Raw
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className={`overflow-x-auto rounded-2xl border glass-panel transition-all ${isDark ? 'bg-white/[0.02] border-white/10' : 'bg-white border-orange-200'}`}>
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className={isDark ? 'bg-white/5' : 'bg-orange-100/50'}>
                                            <th className="p-4 text-[10px] font-black uppercase tracking-widest border-b border-white/5 sticky left-0 z-20 backdrop-blur-md">Entity</th>
                                            {MILESTONE_COLUMNS.map(m => (
                                                <th key={m} className="p-4 text-[10px] font-black uppercase tracking-widest text-center border-b border-white/5 whitespace-nowrap">{m}</th>
                                            ))}
                                            <th className="p-4 text-[10px] font-black uppercase tracking-widest text-center border-b border-white/5 bg-amber-500/10">Total BOs</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {matrixData.map(group => (
                                            <React.Fragment key={group.name}>
                                                <tr className={`border-b transition-colors group ${isDark ? 'border-white/5 hover:bg-white/5' : 'border-orange-100 hover:bg-orange-50'}`}>
                                                    <td className={`p-4 font-bold flex items-center gap-2 cursor-pointer whitespace-nowrap sticky left-0 z-10 ${isDark ? 'bg-[#0a0a0c]' : 'bg-white'}`} 
                                                        onClick={() => handleTableClick(atAGlanceView === 'divisions' ? 'division' : 'subdivision', group.name, 'total_bos')}>
                                                        <span className="p-1 hover:bg-amber-500 hover:text-white rounded-md transition-all" onClick={(e) => { e.stopPropagation(); const n = new Set(expandedRows); n.has(group.name) ? n.delete(group.name) : n.add(group.name); setExpandedRows(n); }}>
                                                            <Icon name={expandedRows.has(group.name) ? 'chevronDown' : 'chevronRight'} size={14} />
                                                        </span>
                                                        <span className="hover:text-amber-500">{group.name}</span>
                                                    </td>
                                                    {MILESTONE_COLUMNS.map(m => (
                                                        <td key={m} onClick={() => handleTableClick(atAGlanceView === 'divisions' ? 'division' : 'subdivision', group.name, m)} 
                                                            className={`p-4 text-center cursor-pointer transition-all hover:bg-amber-500/10 ${group.milestones[m] > 0 ? 'text-amber-500 font-black' : 'opacity-20'}`}>
                                                            {group.milestones[m] || '-'}
                                                        </td>
                                                    ))}
                                                    <td className="p-4 text-center font-black bg-amber-500/5 cursor-pointer hover:bg-amber-500/20" 
                                                        onClick={() => handleTableClick(atAGlanceView === 'divisions' ? 'division' : 'subdivision', group.name, 'total_bos')}>
                                                        {group.total}
                                                    </td>
                                                </tr>
                                                {expandedRows.has(group.name) && Object.values(group.subs).map(sub => (
                                                    <tr key={sub.name} className={`text-xs border-b opacity-80 ${isDark ? 'bg-white/2 border-white/5' : 'bg-orange-50/50 border-orange-100'}`}>
                                                        <td className={`p-3 pl-12 italic cursor-pointer whitespace-nowrap sticky left-0 z-10 ${isDark ? 'bg-[#0a0a0c]' : 'bg-white'} hover:text-amber-500`} onClick={() => handleTableClick(atAGlanceView === 'divisions' ? 'subdivision' : 'so', sub.name, 'total_bos')}>{sub.name}</td>
                                                        {MILESTONE_COLUMNS.map(m => (
                                                            <td key={m} onClick={() => handleTableClick(atAGlanceView === 'divisions' ? 'subdivision' : 'so', sub.name, m)} className="p-3 text-center cursor-pointer hover:bg-amber-500/10">{sub.milestones[m] || '-'}</td>
                                                        ))}
                                                        <td className="p-3 text-center font-bold bg-amber-500/5 cursor-pointer hover:bg-amber-500/10" onClick={() => handleTableClick(atAGlanceView === 'divisions' ? 'subdivision' : 'so', sub.name, 'total_bos')}>{sub.total}</td>
                                                    </tr>
                                                ))}
                                            </React.Fragment>
                                        ))}
                                    </tbody>
                                    <tfoot className="sticky bottom-0 z-30">
                                        <tr className={`font-black ${isDark ? 'bg-[#1a1a1e] text-amber-500' : 'bg-orange-200 text-orange-900'}`}>
                                            <td className="p-4 uppercase tracking-widest cursor-pointer sticky left-0 z-40 bg-inherit hover:bg-amber-500/10" onClick={() => handleTableClick('total', 'TOTAL', 'total_bos')}>Region Total</td>
                                            {MILESTONE_COLUMNS.map(m => (
                                                <td key={m} className="p-4 text-center cursor-pointer hover:bg-amber-500/20" onClick={() => handleTableClick('total', 'TOTAL', m)}>{globalTotals.milestones[m].toLocaleString()}</td>
                                            ))}
                                            <td className="p-4 text-center bg-amber-500/30 cursor-pointer hover:bg-amber-500/50" onClick={() => handleTableClick('total', 'TOTAL', 'total_bos')}>{globalTotals.total.toLocaleString()}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </section>
                    </main>

                    <footer className={`p-12 text-center text-[10px] font-bold uppercase tracking-[0.3em] border-t mt-12 transition-all ${isDark ? 'border-white/5 text-white/20' : 'border-orange-200 text-slate-400'}`}>
                        Vadodara Region Campaign Dashboard • Sub_Division Normalization Active • Build 3.6.1 (Table Headers Fixed)
                    </footer>

                    {/* FLOAT REFRESH BUTTON FOR MOBILE */}
                    <button onClick={fetchData} className="fixed bottom-6 right-6 p-4 bg-amber-500 text-white rounded-full shadow-2xl shadow-amber-500/40 active:scale-95 transition-all z-50">
                        <Icon name="refresh" className={timer < 5 ? 'animate-spin' : ''} />
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
